services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/backend/data/app.db}
    volumes:
      - akatech_backend_data:/app/backend/data
    ports:
      - "127.0.0.1:${BACKEND_PORT:-18000}:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_API_URL:-https://example.com}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-15173}:80"

volumes:
  akatech_backend_data:
